<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #snav fixedInViewport="true" [attr.role]="mobileQuery.matches ? 'dialog' : 'navigation'"
    [mode]="mobileQuery.matches ? 'over' : 'side'" [opened]="!mobileQuery.matches">
    <mat-toolbar color="primary"> Business</mat-toolbar>

    <button type="button" class="uppercase w-full text-left flex flex-col" (click)="dashboard = !dashboard">
      <div class="w-full py-4 px-5 flex items-center text-base hover:bg-gray-200">
        <mat-icon matListIcon>dashboard</mat-icon>
        <div class="flex flex-col flex-auto pl-5">
          <span class="">dashboard</span>
        </div>
      </div>
      <div [class.max-h-32]="dashboard" class="w-full nav-expand overflow-hidden max-h-0">
        <div class="py-3 pl-10 pr-5 hover:bg-gray-600">
          <a matLine routerLink="/dashboard" class="uppercase">dashboard</a>
        </div>
        <div class="py-3 px-5 hover:bg-gray-600">
          <a matLine routerLink="/dashboard" class="uppercase">Neu</a>
        </div>
      </div>
    </button>

    <mat-nav-list>
      <mat-list-item>
        <mat-icon matListIcon>dashboard</mat-icon>
        <a matLine routerLink="/dashboard" class="uppercase">dashboard</a>
      </mat-list-item>

      <mat-list-item>
        <mat-icon matListIcon>book</mat-icon>
        <a matLine routerLink="" class="uppercase">geschichten</a>
      </mat-list-item>

      <mat-list-item>
        <mat-icon matListIcon>photo_library</mat-icon>
        <a matLine routerLink="" class="uppercase">alben</a>
      </mat-list-item>

    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="snav.toggle()"
        *ngIf="mobileQuery.matches">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>

    </mat-toolbar>

    <div class="ylb-app-content">
      <ng-content>
      </ng-content>
    </div>
    <router-outlet></router-outlet>
  </mat-sidenav-content>

</mat-sidenav-container>
