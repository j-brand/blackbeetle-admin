<table mat-table [dataSource]="albums" class="mat-elevation-z8 w-full">
  <ng-container matColumnDef="active">
    <th mat-header-cell *matHeaderCellDef>Sichtbar</th>
    <td mat-cell *matCellDef="let element">{{ element.active }}</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let element">{{ element.title }}</td>
  </ng-container>

  <ng-container matColumnDef="time">
    <th mat-header-cell *matHeaderCellDef>Zeitraum</th>
    <td mat-cell *matCellDef="let element">
      {{ element.start_date | date: "dd.MM.yyyy" }} -
      {{ element.end_date | date: "dd.MM.yyyy" }}
    </td>
  </ng-container>

  <ng-container matColumnDef="options">
    <th mat-header-cell *matHeaderCellDef>Optionen</th>
    <td mat-cell *matCellDef="let element">
      <a
        mat-icon-button
        routerLink="/album/{{ element.id }}"
        class="uppercase w-full"
      >
        <mat-icon>edit</mat-icon>
      </a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
