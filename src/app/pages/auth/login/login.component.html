<div class="h-full w-full flex flex-col justify-center items-center">

  <mat-card class="max-w-sm">
    <mat-card-header class="flex flex-col justify-center">
      <mat-icon class="text-6xl w-16">admin_panel_settings</mat-icon>
    </mat-card-header>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit(loginForm.value)" class="example-form">
      <mat-card-content class="flex flex-col justify-center px-4">

        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Benutzername</mat-label>
          <input formControlName="email" type="text" matInput>
          <mat-hint>Hint</mat-hint>
        </mat-form-field>

        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Passwort</mat-label>
          <input formControlName="password" type="password" matInput>
          <mat-hint>Hint</mat-hint>
        </mat-form-field>

      </mat-card-content>
      <mat-card-actions>
        <div class="ml-6">
          <button type="submit" mat-stroked-button class="uppercase">Anmelden</button>
          <button mat-stroked-button class="uppercase">Registrieren</button>
        </div>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
