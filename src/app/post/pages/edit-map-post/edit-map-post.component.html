<div>
  <google-map width="100%" (mapClick)="addMarker($event)" [options]="options" class="rounded-md border border-gray-300">
    <map-marker
      #markerEle="mapMarker"
      *ngFor="let marker of markers"
      [position]="marker.position"
      [options]="markerOptions"
      (mapClick)="openInfoWindow(markerEle, marker.info)"
    ></map-marker>

    <map-info-window>
      {{ infoContent }}
    </map-info-window>
  </google-map>
</div>
<div>
  <div *ngFor="let marker of markers; index as i" class="bb-list-item">
    <span>{{ marker.info }}</span>
    <div>
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button
          mat-menu-item
          aria-label="edit marker info"
          (click)="editMarker(i)"
        >
          <mat-icon>edit</mat-icon>
          <span>bearbeiten</span>
        </button>
        <button
          mat-menu-item
          aria-label="delete marker"
          (click)="deleteMarker(i)"
        >
          <mat-icon>delete</mat-icon>
          <span>löschen</span>
        </button>
      </mat-menu>
    </div>
  </div>
</div>
