<div class="md:px-4">
  <div class="my-10">
    <h1 class="uppercase font-bold text-2xl">geschichte bearbeiten</h1>
  </div>

  <mat-expansion-panel class="mat-elevation-z0 border border-gray-300">
    <mat-expansion-panel-header>
      <mat-panel-title> Story Details bearbeiten</mat-panel-title>
    </mat-expansion-panel-header>

    <app-create-update-story></app-create-update-story>
  </mat-expansion-panel>

  <div
    cdkDropList
    *ngIf="posts"
    (cdkDropListDropped)="postPositionChanged($event)"
  >
    <div
      cdkDrag
      class="bb-list-item"
      *ngFor="let post of posts"
      [class.text-gray-400]="post?.active == '0'"
    >
      <mat-icon *ngIf="post.type == 'html'" aria-hidden="false"
        >article</mat-icon
      >
      <mat-icon *ngIf="post.type == 'image'" aria-hidden="false"
        >image</mat-icon
      >
      <mat-icon *ngIf="post.type == 'map'" aria-hidden="false"
        >map</mat-icon
      >
      <mat-icon *ngIf="post.type == 'video'" aria-hidden="false"
        >movie</mat-icon
      >

      <div class="ml-5 lg:ml-20 flex flex-col flex-1">
        <span>{{ post.title }}</span>
        <small>{{ post.date | date: 'd.MM.Y' }}</small>
      </div>

      <div class="">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item
          routerLink="/post/{{ post.id }}"
          >
            <mat-icon>edit</mat-icon>
            <span>bearbeiten</span>
          </button>
          <button mat-menu-item
          (click)="deletePost(post.id)"
          >
            <mat-icon>delete</mat-icon>
            <span>löschen</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</div>
<div class="fixed bottom-10 right-12">
  <div [class.max-h-52]="expand" class="h-auto max-h-0 flex flex-col items-center overflow-hidden transition-all duration-150 ease-in-out">
    <div class="mb-3">
      <button mat-mini-fab (click)="createPost('html')" color="primary" aria-label="new text post">
        <mat-icon>article</mat-icon>
      </button>
    </div>
    <div class="mb-3">
      <button mat-mini-fab (click)="createPost('image')" color="primary" aria-label="new image post">
        <mat-icon>image</mat-icon>
      </button>
    </div>
    <div class="mb-3">
      <button mat-mini-fab (click)="createPost('map')" color="primary" aria-label="new map post">
        <mat-icon>map</mat-icon>
      </button>
    </div>
    <div class="mb-3">
      <button mat-mini-fab (click)="createPost('video')" color="primary" aria-label="new video post">
        <mat-icon>movie</mat-icon>
      </button>
    </div>
  </div>
  <button mat-fab color="primary" (click)="expand=!expand" aria-label="add a new post">
    <mat-icon>add</mat-icon>
  </button>
</div>
